<html>
  <body>
    <div class="login">
      <h1>FWI Prediction</h1>
      >
      <form action="/predict" method="post">
        <input
          type="text"
          name="temp"
          placeholder="Temperature"
          required
        /><br /><br />
        <input
          type="text"
          name="rh"
          placeholder="Relative Humidity"
          required
        /><br /><br />
        <input
          type="text"
          name="ws"
          placeholder="Wind Speed"
          required
        /><br /><br />
        <input
          type="text"
          name="rain"
          placeholder="Rainfall"
          required
        /><br /><br />
        <input
          type="text"
          name="ffmc"
          placeholder="FFMC"
          required
        /><br /><br />
        <input type="text" name="dmc" placeholder="DMC" required /><br /><br />
        <input type="text" name="ISI" placeholder="ISI" required /><br /><br />
        <input
          type="text"
          name="Classes"
          placeholder="Classes"
          required
        /><br /><br />
        <input
          type="text"
          name="Region"
          placeholder="Region"
          required
        /><br /><br />

        <button type="submit" class="btn btn-primary btn-block btn-large">
          Predict
        </button>
      </form>
      <h2>Predicted FWI: {{results}}</h2>
    </div>
  </body>
</html>
